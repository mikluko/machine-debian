name: build

# Builds the arm64 base image and its overlays, pushes to GHCR.
# arm64 only: these images boot Apple `container` machines on Apple Silicon.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - "*.Dockerfile"
      - .github/workflows/build.yaml
  workflow_run:
    # Rebuild after the daily base-bump commits a new Debian snapshot pin.
    workflows: [base-bump]
    types: [completed]
  workflow_dispatch:

# Serialize builds: a new run queues behind the in-progress one instead of
# cancelling it, so pushes publish in order.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  BASE: ghcr.io/${{ github.repository }}
  # Deterministic version tag EPOCH.BUILD. BUILD is GHA's sequential run
  # counter; bump EPOCH by hand on a breaking base change.
  EPOCH: "0"

jobs:
  base:
    runs-on: ubuntu-24.04-arm
    # When chained from base-bump, only build if that run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BASE }}:latest
            ${{ env.BASE }}:${{ env.EPOCH }}.${{ github.run_number }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  overlays:
    # Overlays are FROM the base image, so it must be pushed first.
    needs: base
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        overlay: [kind, jdk25]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.overlay }}.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BASE }}/${{ matrix.overlay }}:latest
            ${{ env.BASE }}/${{ matrix.overlay }}:${{ env.EPOCH }}.${{ github.run_number }}
          cache-from: type=gha,scope=${{ matrix.overlay }}
          cache-to: type=gha,mode=max,scope=${{ matrix.overlay }}
